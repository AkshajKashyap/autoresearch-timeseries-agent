experiment:
  name: csv_linear

dataset:
  source: csv
  path: data/raw/example_timeseries.csv
  timestamp_column: timestamp
  target_column: value
  feature_columns: null
  split_strategy: chronological
  input_length: 48
  forecast_horizon: 24
  train_fraction: 0.7
  val_fraction: 0.15
  seed: 42

model:
  name: linear
  alpha: 1.0

training:
  scale_features: false
  normalize_target: false

reporting:
  runs_dir: reports/runs
